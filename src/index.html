<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Paradise under pressure — explorer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="stage"></div>
  <div id="labels"></div>

  <div class="ui" id="brand">Paradise under pressure</div>
  <div class="ui" id="year"><div class="big">2019</div><div class="lab"></div></div>
  <div class="ui" id="legend"></div>
  <div class="ui" id="hint">Drag to rotate · scroll to zoom · click an island</div>

  <div id="dock">
    <div id="timebar">
      <button id="playBtn" title="Play through the years">&#9654;</button>
      <input id="yearSlider" type="range" min="1995" max="2024" step="1" value="2019" />
    </div>
    <div id="layers"></div>
  </div>

  <div id="tip"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
